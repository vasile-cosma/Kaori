<!DOCTYPE html>
<html class="no-js" lang="es" xmlns:th="https://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Perfil de usuario</title>

    <link th:replace="~{fragments/styles::styles}">
    <link rel="stylesheet" th:href="@{/css/profile.css}">
</head>

<body class="biolife-body">

<!-- HEADER -->
<header th:insert="~{fragments/headers::header}"></header>

<div class="page-contain">

    <div id="main-content" class="main-content">

        <!-- Header perfil -->
        <div class="profile-header text-center">
            <div class="container">
                <h2>Mi perfil</h2>
                <p>Consulta y gestiona tu información personal</p>
            </div>
        </div>

        <!-- Contenido -->
        <div class="container">

            <div class="card profile-card p-4">

                <div class="text-center mb-4">
                    <div class="profile-avatar">
                        <span th:text="${user.name.substring(0,1)}">U</span>
                    </div>

                    <h3 class="mt-3">
                        <span th:text="${user.name}">Nombre</span>
                        <span th:text="${user.lastName}">Apellido</span>
                    </h3>

                    <p class="text-muted" th:text="${user.username}">@username</p>
                </div>

                <div class="row">

                    <div class="col-md-6 profile-section">
                        <div class="profile-label">Email</div>
                        <div class="profile-value" th:text="${user.email}"></div>
                    </div>

                    <div class="col-md-6 profile-section">
                        <div class="profile-label">Teléfono</div>
                        <div class="profile-value"
                             th:text="${user.phoneNumber != null ? user.phoneNumber : 'No especificado'}">
                        </div>
                    </div>

                    <div class="col-md-6 profile-section">
                        <div class="profile-label">Fecha de nacimiento</div>
                        <div class="profile-value"
                             th:text="${user.birthDate != null ? user.birthDate : 'No especificada'}">
                        </div>
                    </div>

                    <div class="col-md-6 profile-section">
                        <div class="profile-label">Fecha de registro</div>
                        <div class="profile-value"
                             th:text="${#temporals.format(user.registrationDate,'dd/MM/yyyy HH:mm')}">
                        </div>
                    </div>

                </div>

                <div class="text-center mt-4">
                    <a href="/profile/edit" class="btn btn-primary">
                        Editar perfil
                    </a>
                </div>

            </div>

        </div>

    </div>
</div>

<!-- FOOTER -->
<div th:replace="~{fragments/footer::footer}"></div>


<div th:replace="~{fragments/scripts::scripts}"></div>

</body>
</html>
