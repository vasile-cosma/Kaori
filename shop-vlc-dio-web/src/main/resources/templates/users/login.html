<!DOCTYPE html>
<html class="no-js" lang="es" xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <th:block th:replace="~{fragments/styles::styles}"></th:block>
</head>
<body class="biolife-body">

<!-- Preloader -->
<div id="biof-loading">
  <div class="biof-loading-center">
    <div class="biof-loading-center-absolute">
      <div class="dot dot-one"></div>
      <div class="dot dot-two"></div>
      <div class="dot dot-three"></div>
    </div>
  </div>
</div>

<!-- HEADER -->
<header th:insert="~{fragments/headers::header}"></header>

<!--Hero Section-->
<div th:replace="~{fragments/hero::hero('Inicio de sesión')}"></div>

<!--Navigation section-->
<div class="container">
  <nav class="biolife-nav">
    <ul>
      <li class="nav-item"><a th:href="@{/index}" class="permal-link">Home</a></li>
      <li class="nav-item"><span class="current-page">Login</span></li>
    </ul>
  </nav>
</div>

<div class="page-contain login-page">

  <th:block th:if="${error}">
    <div class="container"> <i class="bi bi-exclamation-triangle-fill me-2"></i>
      <div class="alert alert-danger" th:text="${error}">Error</div>
    </div>
  </th:block>

  <!-- Main content -->
  <div id="main-content" class="main-content">
    <div class="container">

      <div class="row">

        <!--Form Sign In-->
        <div class="col-lg-6 col-md-6 col-sm-6 col-xs-12">
          <div class="signin-container">
            <form name="frm-login" id="myForm" class="needs-validation" th:method="post" th:action="@{/login}" th:novalidate="${!clientValidationEnabled}">
              <p class="form-row">
                <label for="username">Nombre de usuario:<span class="requite">*</span></label>
                <input type="text" id="username" name="username" class="txt-input">
              </p>
              <p class="form-row">
                <label for="password">Contraseña:<span class="requite">*</span></label>
                <input type="password" id="password" name="password" class="txt-input">
              </p>
              <p class="form-row wrap-btn">
                <button class="btn btn-submit btn-bold" type="submit">Iniciar sesión</button>
                <a href="#" class="link-to-help">Olvidé mi contraseña</a>
              </p>
            </form>
          </div>
        </div>

        <!--Go to Register form-->
        <div class="col-lg-6 col-md-6 col-sm-6 col-xs-12">
          <div class="register-in-container">
            <div class="intro">
              <h4 class="box-title">¿No tienes cuenta?</h4>
              <p class="sub-title">Regístrate en Kaori para tener acceso a:</p>
              <ul class="lis">
                <li>Un checkout más rápido</li>
                <li>Guardar múltiples direcciones de envío y/o facturación</li>
                <li>Historial de pedidos</li>
                <li>Seguimiento de envíos</li>
                <li>Lista de deseos</li>
              </ul>
              <a th:href="@{/register}" class="btn btn-bold">Regístrame</a>
            </div>
          </div>
        </div>

      </div>

    </div>

  </div>

</div>

<!-- FOOTER -->
<footer th:insert="~{fragments/footer::footer}"></footer>


<!-- Scroll Top Button -->
<a class="btn-scroll-top"><i class="biolife-icon icon-left-arrow"></i></a>

<div th:insert="~{fragments/scripts::scripts}"></div>
<script>
  // Obtener formulario y campos
  const form = document.getElementById("myForm");
  const campos = form.querySelectorAll("input");


  // Validación en tiempo real
  campos.forEach((campo) => {
    campo.addEventListener("input", () => {
      if (campo.checkValidity()) {
        campo.classList.remove("is-invalid");
        campo.classList.add("is-valid");
      } else {
        campo.classList.remove("is-valid");
        campo.classList.add("is-invalid");
      }
    });
  });

  // Validación al enviar
  form.addEventListener("submit", (e) => {
    if (!form.checkValidity()) {
      e.preventDefault();
      e.stopPropagation();

      campos.forEach((campo) => {
        if (!campo.checkValidity()) {
          campo.classList.add("is-invalid");
        }
      });
    }
  });
</script>
</body>

</html>
