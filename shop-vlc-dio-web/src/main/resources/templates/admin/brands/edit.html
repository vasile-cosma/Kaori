<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar marca</title>
    <link th:replace="~{fragments/styles::styles}">
</head>
<body>

<!--<header th:insert="~{fragments/headers::adminHeader}"></header>-->
<div class="container text-center">
    <h1 class="text-decoration-underline" style="color: #2b542c;" th:text="|Editar ${brand.name}|">Editar Marca</h1>
</div>

<form th:method="post" th:object="${brand}" id="myorm" th:action="@{/admin/brands/edit/{id}(id=${id})}" th:novalidate="${!clientValidationEnabled}">
    <div class="container">
        <div class="alert alert-danger" role="alert"
             th:if="${#fields.hasAnyErrors()}">
            <p>Se han producido
                errores. Por favor, corríjalos antes de volver a intentar la operación.</p>
        </div>
        <div class="mb-3">
            <label for="name" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="name" aria-describedby="textHelp" th:field="*{name}" th:errorclass = "is-invalid">
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('name')}"
                 th:errors="*{name}">Error en el nombre
            </div>
        </div>
        <div class="d-flex justify-content-end gap-2 mb-4">
            <button type="submit" class="btn text-light mt-3 rounded-start-pill" style="background-color: #7faf51">Confirmar</button>
            <a class="btn btn-danger mt-3 border rounded-end-pill" th:href="@{/admin/brands}">Cancelar</a>
        </div>
    </div>
</form>

<footer th:insert="~{fragments/footer::adminFooter}"></footer>
<div th:replace="~{fragments/scripts::scripts}"></div>

</body>
</html>
